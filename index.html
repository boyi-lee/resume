<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">履歷</title>
<meta id="metaDesc" name="description" content="">
<meta id="ogTitle"  property="og:title" content="">
<meta id="ogDesc"   property="og:description" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="spotlight" id="spotlight"></div>

<div class="top-controls">
  <button class="ctrl-btn" id="langBtn" onclick="toggleLang()">EN</button>
  <button class="ctrl-btn" id="themeBtn" onclick="toggleTheme()">☀</button>
</div>

<div class="container">
  <aside class="sidebar">
    <div class="photo-wrap">
      <div class="photo-ring"></div>
      <div class="photo-clip">
        <picture>
          <source id="photoWebp" srcset="photo.webp" type="image/webp">
          <img id="photoImg" src="photo.jpg" alt="" width="96" height="96">
        </picture>
      </div>
    </div>
    <h1 class="name"    id="profileName"></h1>
    <h2 class="title"   id="profileTitle"></h2>
    <p  class="tagline" id="profileTagline"></p>

    <nav class="nav">
      <ul>
        <li><a class="nav-link active" href="#about"      data-section="about">     <span class="nav-line"></span><span class="nav-label">About</span></a></li>
        <li><a class="nav-link"        href="#numbers"    data-section="numbers">   <span class="nav-line"></span><span class="nav-label">Numbers</span></a></li>
        <li><a class="nav-link"        href="#experience" data-section="experience"><span class="nav-line"></span><span class="nav-label">Experience</span></a></li>
        <li><a class="nav-link"        href="#skills"     data-section="skills">    <span class="nav-line"></span><span class="nav-label">Skills</span></a></li>
      </ul>
    </nav>

    <address class="contact">
      <ul class="contact-list" id="contactList"></ul>
    </address>

    <div class="interests-block">
      <div class="block-label" id="interestsLabel">興趣</div>
      <div id="interestsList"></div>
    </div>

    <div class="interests-block">
      <div class="block-label" id="projectsLabel">興趣延伸 AI 實作</div>
      <div id="projectsList"></div>
    </div>

    <a href="#" class="cta" id="ctaBtn">
      <span id="ctaLabel">下載履歷 PDF</span>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </a>
  </aside>

  <main class="content">
    <section id="about" class="section">
      <div class="section-head" id="aboutHead">關於我</div>
      <div class="section-content">
        <div class="about-text" id="aboutText"></div>
      </div>
    </section>

    <section id="numbers" class="section">
      <div class="section-head" id="numbersHead">關鍵數字</div>
      <div class="section-content">
        <div class="numbers-strip" id="numbersStrip"></div>
      </div>
    </section>

    <section id="experience" class="section">
      <div class="section-head" id="expHead">工作經歷</div>
      <div class="section-content">
        <div class="timeline" id="timeline"></div>
      </div>
    </section>

    <section id="skills" class="section">
      <div class="section-head" id="skillsHead">技能專長</div>
      <div class="section-content">
        <div class="skill-groups" id="skillGroups"></div>
      </div>
    </section>

    <footer class="footer">
      <div class="footer-links" id="footerLinks"></div>
      <p id="footerCopy"></p>
    </footer>
  </main>
</div>

<script src="script.js"></script>
<script>
// ── 從 data.json 讀取並渲染 ──
let resumeData = null;
let currentLang = 'zh';

async function loadData() {
  try {
    const res = await fetch('data.json');
    resumeData = await res.json();
  } catch(e) {
    document.body.innerHTML = `
      <div style="font-family:sans-serif;padding:3rem;color:#e2e8f0;background:#0f172a;min-height:100vh">
        <h2 style="color:#f1f5f9">⚠️ 無法讀取 data.json</h2>
        <p style="margin-top:1rem;color:#94a3b8;line-height:1.8">
          直接用瀏覽器開啟 HTML 時，fetch() 會被封鎖。<br>
          請用本地伺服器執行，例如：<br><br>
          <code style="background:#1e293b;padding:.4rem .9rem;border-radius:.4rem;font-size:.9rem">npx serve .</code><br><br>
          或安裝 VS Code 的 <strong>Live Server</strong> 擴充套件後右鍵 → Open with Live Server。
        </p>
      </div>`;
    return;
  }
  renderAll();
}

function t(zhVal, enVal) {
  return currentLang === 'zh' ? zhVal : enVal;
}

function renderAll() {
  const d = resumeData;

  // ── Meta ──
  document.getElementById('pageTitle').textContent = t(d.meta.titleZh, d.meta.titleEn);
  document.getElementById('metaDesc').content      = t(d.meta.descriptionZh, d.meta.descriptionEn);
  document.getElementById('ogTitle').content       = t(d.meta.titleZh, d.meta.titleEn);
  document.getElementById('ogDesc').content        = t(d.meta.descriptionZh, d.meta.descriptionEn);
  document.documentElement.lang = currentLang === 'zh' ? 'zh-TW' : 'en';

  // ── Profile ──
  document.getElementById('profileName').textContent    = t(d.profile.nameZh,    d.profile.nameEn);
  document.getElementById('profileTitle').textContent   = t(d.profile.titleZh,   d.profile.titleEn);
  document.getElementById('profileTagline').textContent = t(d.profile.taglineZh, d.profile.taglineEn);
  document.getElementById('photoWebp').srcset = d.profile.photo;
  const img = document.getElementById('photoImg');
  img.src = d.profile.photoFallback;
  img.alt = `${d.profile.nameZh} 個人照`;

  // ── Contact ──
  document.getElementById('contactList').innerHTML = d.contact.map(c => `
    <li><a href="${c.href}"${c.type === 'link' ? ' target="_blank" rel="noopener"' : ''}>${c.label}</a></li>
  `).join('');

  // ── Interests ──
  document.getElementById('interestsLabel').textContent = t('興趣', 'Interests');
  document.getElementById('interestsList').innerHTML = d.interests.map(i => `
    <div class="interest-row"><span>${i.emoji}</span><span>${t(i.labelZh, i.labelEn)}</span></div>
  `).join('');

  // ── Side Projects ──
  document.getElementById('projectsLabel').textContent = t('興趣延伸 AI 實作', 'AI Side Projects');
  document.getElementById('projectsList').innerHTML = d.sideProjects.map(p => `
    <a href="${p.href}" target="_blank" rel="noopener" class="ai-link">🔗 ${t(p.labelZh, p.labelEn)}</a>
  `).join('');

  // ── CTA ──
  document.getElementById('ctaLabel').textContent = t('下載履歷 PDF', 'Download Resume PDF');

  // ── About ──
  document.getElementById('aboutHead').textContent = t('關於我', 'About');
  document.getElementById('aboutText').innerHTML =
    t(d.about.paragraphsZh, d.about.paragraphsEn).map(p => `<p>${p}</p>`).join('');

  // ── Numbers ──
  document.getElementById('numbersHead').textContent = t('關鍵數字', 'Numbers');
  document.getElementById('numbersStrip').innerHTML = d.numbers.map(n => `
    <div class="num-cell">
      <div class="num-val" data-target="${n.target}" data-suffix="${n.suffix||''}">${n.value}</div>
      <div class="num-label1">${t(n.label1Zh, n.label1En)}</div>
      ${(n.label2Zh||n.label2En) ? `<div class="num-label2">${t(n.label2Zh||'', n.label2En||'')}</div>` : ''}
      <div class="num-bar" style="width:${n.barWidth}%"></div>
    </div>
  `).join('');
  runCounters();

  // ── Experience ──
  document.getElementById('expHead').textContent = t('工作經歷', 'Experience');
  document.getElementById('timeline').innerHTML = d.experience.map(e => `
    <div class="tl-item">
      <div class="tl-dot"${e.featured ? ' style="border-color:var(--accent);background:var(--accent);"' : ''}></div>
      <time class="tl-period" datetime="${e.datetime}">${t(e.periodZh, e.periodEn)}</time>
      <div class="tl-title">
        <span class="tl-company">${t(e.companyZh, e.companyEn)}</span> · ${t(e.roleZh, e.roleEn)}
      </div>
      <ul class="tl-desc-list">${
        t(e.descZh, e.descEn)
          .split(/\s*[-－]\s+/)
          .filter(s => s.trim())
          .map(s => `<li>${s.trim()}</li>`)
          .join('')
      }</ul>
      ${e.highlight ? `
        <div class="tl-highlight">
          <strong>${t(e.highlight.labelZh, e.highlight.labelEn)}</strong>
          ${t(e.highlight.textZh, e.highlight.textEn)}
        </div>` : ''}
    </div>
  `).join('');

  // ── Skills ──
  document.getElementById('skillsHead').textContent = t('技能專長', 'Skills');
  document.getElementById('skillGroups').innerHTML = d.skillGroups.map(g => `
    <div>
      <div class="skill-group-title">${t(g.titleZh, g.titleEn)}</div>
      <div class="tags">${g.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
    </div>
  `).join('');

  // ── Footer：顯示固定標籤 Mail / Phone / Line / Download ──
  const footerLabels = { email: 'Mail', phone: 'Phone', link: 'Line' };
  document.getElementById('footerLinks').innerHTML =
    d.contact.map(c => `<a href="${c.href}" class="footer-link"${c.type==='link'?' target="_blank" rel="noopener"':''}>${footerLabels[c.type]||c.label}</a>`).join('') +
    `<a href="#" class="footer-link" onclick="window.print();return false;">Download</a>`;
  document.getElementById('footerCopy').textContent =
    `© ${new Date().getFullYear()} ${d.profile.nameZh}`;

  // 重新掛載互動事件
  initInteractions();
}

// ── 數字跑動動畫 ──
function runCounters() {
  document.querySelectorAll('.num-val[data-target]').forEach(el => {
    const target = parseFloat(el.dataset.target);
    const suffix = el.dataset.suffix || '';
    if (isNaN(target)) return;
    const isFloat = !Number.isInteger(target);
    const duration = 1200;
    const start = performance.now();
    function step(now) {
      const progress = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 3);
      const val = target * ease;
      el.textContent = (isFloat ? val.toFixed(1) : Math.round(val)) + suffix;
      if (progress < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

// 覆寫 script.js 的 toggleLang，改由這裡驅動
function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  document.getElementById('langBtn').textContent = currentLang === 'zh' ? 'EN' : '中';
  renderAll();
}

loadData();
</script>
</body>
</html>
