<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">履歷</title>
<meta id="metaDesc" name="description" content="">
<meta id="ogTitle"  property="og:title" content="">
<meta id="ogDesc"   property="og:description" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

/* ── Tokens ── */
:root{
  --bg:        #0f172a;
  --bg2:       #1e293b;
  --border:    rgba(148,163,184,.12);
  --text:      #94a3b8;
  --text2:     #cbd5e1;
  --heading:   #e2e8f0;
  --accent:    #2dd4bf;
  --accent2:   rgba(45,212,191,.15);
  --spot:      rgba(29,78,216,.15);
  --font:      'Inter', -apple-system, sans-serif;
  --ease:      cubic-bezier(.4,0,.2,1);
  --radius:    .5rem;
}

/* ── 深淺色：系統預設偵測 ── */
@media(prefers-color-scheme:light){
  :root{
    --bg:        #f8fafc;
    --bg2:       #f1f5f9;
    --border:    rgba(71,85,105,.12);
    --text:      #475569;
    --text2:     #334155;
    --heading:   #0f172a;
    --accent:    #0d9488;
    --accent2:   rgba(13,148,136,.1);
    --spot:      rgba(13,148,136,.08);
  }
}

/* ── 手動切換覆蓋系統預設 ── */
[data-theme="light"]{
  --bg:        #f8fafc;
  --bg2:       #f1f5f9;
  --border:    rgba(71,85,105,.12);
  --text:      #475569;
  --text2:     #334155;
  --heading:   #0f172a;
  --accent:    #0d9488;
  --accent2:   rgba(13,148,136,.1);
  --spot:      rgba(13,148,136,.08);
}
[data-theme="dark"]{
  --bg:        #0f172a;
  --bg2:       #1e293b;
  --border:    rgba(148,163,184,.12);
  --text:      #94a3b8;
  --text2:     #cbd5e1;
  --heading:   #e2e8f0;
  --accent:    #2dd4bf;
  --accent2:   rgba(45,212,191,.15);
  --spot:      rgba(29,78,216,.15);
}

/* ── Base ── */
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  line-height:1.75;
  -webkit-font-smoothing:antialiased;
  transition:background .3s var(--ease), color .3s var(--ease);
}
::selection{background:var(--accent);color:var(--bg);}
a{color:inherit;text-decoration:none;}

/* ── Spotlight ── */
.spotlight{
  position:fixed;top:0;left:0;width:100vw;height:100vh;
  pointer-events:none;z-index:0;
  background:radial-gradient(600px at var(--x,50%) var(--y,50%), var(--spot), transparent 80%);
}

/* ── Layout ── */
.container{
  position:relative;z-index:1;
  max-width:1100px;margin:0 auto;
  padding:3rem 1.5rem;
}
@media(min-width:1024px){
  .container{padding:0;display:grid;grid-template-columns:340px 1fr;align-items:start;}
}

/* ── Top controls ── */
.top-controls{
  position:fixed;top:0;right:0;z-index:100;
  display:flex;align-items:center;gap:.5rem;
  padding:.75rem 1.25rem;
}
.ctrl-btn{
  display:flex;align-items:center;gap:.3rem;
  padding:.3rem .75rem;border-radius:999px;
  border:1px solid var(--border);background:transparent;
  font-family:var(--font);font-size:.7rem;font-weight:600;
  letter-spacing:.05em;text-transform:uppercase;
  color:var(--text);cursor:pointer;
  transition:all .2s var(--ease);
}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent);}
.ctrl-btn.active{background:var(--accent);border-color:var(--accent);color:var(--bg);}

/* ── Sidebar ── */
.sidebar{
  padding:5rem 3rem 5rem 3.5rem;
  position:sticky;top:0;height:100vh;
  overflow-y:auto;display:flex;flex-direction:column;
}
.sidebar::-webkit-scrollbar{display:none;}

/* Profile photo */
.photo-wrap{position:relative;width:96px;height:96px;margin-bottom:1.25rem;}
.photo-clip{
  width:96px;height:96px;border-radius:50%;overflow:hidden;
  position:relative;z-index:1;
}
.photo-wrap img{
  width:100%;height:100%;object-fit:cover;object-position:center 15%;
  filter:grayscale(100%) contrast(1.1);
  transform:scale(1);transform-origin:center 30%;
  transition:filter .4s var(--ease), transform .5s var(--ease);
  display:block;
}
.photo-wrap:hover img{
  filter:grayscale(0%) contrast(1);
  transform:scale(1.14);
}
.photo-ring{
  position:absolute;inset:-4px;border-radius:50%;z-index:0;pointer-events:none;
  border:2px solid transparent;
  background:transparent padding-box,
             conic-gradient(from 0deg, var(--accent) 0%, transparent 35%, var(--accent) 55%, transparent 80%, var(--accent) 100%) border-box;
  animation:ring-spin 3s linear infinite paused;
  will-change:transform;
}
.photo-wrap:hover .photo-ring{animation-play-state:running;}
@keyframes ring-spin{to{transform:rotate(360deg);}}

.name{font-size:1.6rem;font-weight:700;color:var(--heading);line-height:1.1;letter-spacing:-.025em;margin-bottom:.4rem;}
.title{font-size:.95rem;font-weight:500;color:var(--accent);margin-bottom:.6rem;}
.tagline{font-size:.875rem;color:var(--text);max-width:260px;line-height:1.6;}

/* Nav */
.nav{margin:2.5rem 0;flex:1;}
.nav ul{list-style:none;}
.nav-link{
  display:flex;align-items:center;gap:.75rem;
  padding:.5rem 0;cursor:pointer;
}
.nav-line{
  width:2rem;height:1px;background:var(--text);
  transition:width .3s var(--ease), background .3s;
}
.nav-label{
  font-size:.7rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--text);
  transition:color .3s;
}
.nav-link:hover .nav-line, .nav-link.active .nav-line{width:3.5rem;background:var(--heading);}
.nav-link:hover .nav-label, .nav-link.active .nav-label{color:var(--heading);}

/* Contact */
.contact{margin-bottom:1.5rem;}
.contact-list{list-style:none;padding:0;margin:0;}
.contact-list li{font-size:.82rem;margin-bottom:.4rem;}
.contact-list a{transition:color .2s;}
.contact-list a:hover{color:var(--accent);}

/* Interests */
.interests-block{border-top:1px solid var(--border);padding-top:1.25rem;margin-top:1.25rem;}
.block-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--heading);margin-bottom:.75rem;}
.interest-row{display:flex;align-items:center;gap:.4rem;font-size:.82rem;margin-bottom:.4rem;}
.ai-link{
  display:flex;align-items:center;gap:.4rem;font-size:.78rem;
  padding:.2rem 0;transition:color .2s;
}
.ai-link:hover{color:var(--accent);}

/* CTA */
.cta{
  display:inline-flex;align-items:center;gap:.4rem;margin-top:1.5rem;
  padding:.65rem 1.25rem;border:1.5px solid var(--border);border-radius:var(--radius);
  font-size:.8rem;font-weight:600;color:var(--heading);
  transition:all .25s var(--ease);
}
.cta:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(45,212,191,.12);}

/* ── Content ── */
.content{padding:5rem 3.5rem 5rem 2rem;max-width:640px;}
@media(max-width:1023px){.content{max-width:100%;padding:2rem 1.5rem;}}

.section{margin-bottom:5rem;scroll-margin-top:5rem;}

/* Section heading for mobile */
.section-head{
  display:none;
  position:sticky;top:0;z-index:10;
  background:rgba(15,23,42,.8);backdrop-filter:blur(12px);
  padding:.75rem 1.5rem;margin:0 -1.5rem 1.5rem;
  font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--heading);
}
[data-theme="light"] .section-head{background:rgba(248,250,252,.85);}
@media(max-width:1023px){.section-head{display:block;}}

/* ── About ── */
.about-text{font-size:1rem;line-height:1.75;color:var(--text2);}
.about-text p{margin-bottom:1.25rem;}
.about-text p:last-child{margin-bottom:0;}

/* ── Counter animation ── */
@keyframes fadeSlideUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:none; }
}
.num-cell {
  opacity:0;
}
.num-cell.in-view {
  animation: fadeSlideUp .5s var(--ease) both;
}
.num-cell.in-view:nth-child(1){ animation-delay:.00s; }
.num-cell.in-view:nth-child(2){ animation-delay:.10s; }
.num-cell.in-view:nth-child(3){ animation-delay:.20s; }
.num-cell.in-view:nth-child(4){ animation-delay:.30s; }

/* ── Numbers — Option A: 2-col grid, arrow cards span full width ── */
.numbers-strip{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1rem;
  margin:2rem 0;
  padding:0;
  border:none;
}
@media(max-width:480px){
  .numbers-strip{ 
    grid-template-columns:1fr; 
    gap:.75rem; 
  }
}

.num-cell{
  background:rgba(45,212,191,.06);
  border:1px solid rgba(45,212,191,.2);
  border-radius:1rem;
  padding:1.5rem 1.25rem 1.25rem;
  position:relative;
  transition:all .3s var(--ease);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:.6rem;
}

/* Arrow-type cells span both columns */
.num-cell.is-arrow{
  grid-column: span 2;
  flex-direction:row;
  align-items:center;
  justify-content:center;
  gap:0;
  padding:1.25rem 1.5rem;
}

@media(max-width:480px){
  .num-cell.is-arrow{ grid-column:span 1; flex-direction:column; gap:.6rem; }
}

.num-cell::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg, var(--accent), rgba(45,212,191,.4));
  transform:scaleX(0);
  transform-origin:left;
  transition:transform .4s var(--ease);
}

.num-cell:hover{
  background:rgba(45,212,191,.1);
  border-color:rgba(45,212,191,.35);
  transform:translateY(-3px);
  box-shadow:0 12px 32px rgba(45,212,191,.15);
}

.num-cell:hover::before{
  transform:scaleX(1);
}

/* Single-value layout */
.num-val{
  font-size:1.8rem;
  font-weight:800;
  color:var(--heading);
  line-height:1;
  font-variant-numeric:tabular-nums;
  letter-spacing:-.02em;
  text-align:center;
}

/* Arrow layout: before/after columns */
.num-before, .num-after{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.3rem;
}
.num-from{
  font-size:1.35rem;
  font-weight:800;
  color:var(--text);
  font-variant-numeric:tabular-nums;
  text-decoration:line-through;
  text-decoration-color:rgba(45,212,191,.4);
  text-decoration-thickness:2px;
}
.num-to{
  font-size:1.8rem;
  font-weight:800;
  color:var(--accent);
  font-variant-numeric:tabular-nums;
  letter-spacing:-.02em;
  line-height:1;
}
.num-sublabel{
  font-size:.68rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--text);
  opacity:.6;
}
.num-arrow-icon{
  font-size:1.4rem;
  color:var(--accent);
  font-weight:700;
  padding:0 .75rem;
  flex-shrink:0;
  opacity:.7;
}
.num-arrow-label{
  font-size:.78rem;
  font-weight:600;
  color:var(--text2);
  text-align:center;
  line-height:1.4;
  margin-left:.75rem;
  border-left:1px solid rgba(45,212,191,.25);
  padding-left:.75rem;
  max-width:90px;
  word-break:keep-all;
  text-wrap:pretty;
}

.num-label1{
  font-size:.8rem;
  font-weight:600;
  color:var(--text2);
  line-height:1.4;
  text-align:center;
  opacity:.9;
  word-break:keep-all;
  text-wrap:pretty;
}
.num-arrow-label{
  word-break:keep-all;
  text-wrap:pretty;
}
.num-sublabel{
  word-break:keep-all;
}

[data-theme="light"] .num-cell{
  background:rgba(13,148,136,.06);
  border-color:rgba(13,148,136,.2);
}
[data-theme="light"] .num-cell:hover{
  background:rgba(13,148,136,.1);
  border-color:rgba(13,148,136,.35);
}
[data-theme="light"] .num-cell::before{
  background:linear-gradient(90deg, #0d9488, rgba(13,148,136,.4));
}
[data-theme="light"] .num-from{
  color:var(--text);
}
[data-theme="light"] .num-to{
  color:var(--accent);
}

/* ── Experience desc as list ── */
.tl-desc-list{
  list-style:none;padding:0;margin:0 0 .75rem;
  font-size:.875rem;color:var(--text);line-height:1.65;
}
.tl-desc-list li{
  padding-left:1rem;position:relative;
  margin-bottom:.75rem;
}
.tl-desc-list li::before{
  content:'–';position:absolute;left:0;
  color:var(--accent);font-weight:700;
}
.tl-item:hover .tl-desc-list{ font-size:.9rem; }

.tl-desc{
  font-size:.875rem;color:var(--text);line-height:1.65;margin-bottom:.75rem;
  transition:font-size .2s var(--ease);
}

.tl-desc p{
  margin-bottom:1rem;
}

.tl-desc p:last-child{
  margin-bottom:0;
}

/* ── Timeline / Experience ── */
.timeline{position:relative;padding-left:1.5rem;}
.timeline::before{
  content:'';position:absolute;left:0;top:4px;bottom:0;
  width:1px;background:var(--border);
}

.tl-item{
  position:relative;margin-bottom:2rem;
  padding:1rem 1rem 1rem 0;
  border:1px solid transparent;
  border-radius:var(--radius);
  transition:border-color .25s var(--ease), opacity .25s var(--ease);
  cursor:default;
}
.tl-item:last-child{margin-bottom:0;}

.tl-item:hover{
  border-color:var(--border);
  background:rgba(45,212,191,.03);
}
.tl-item:hover .tl-title{ font-size:1rem; }
.tl-item:hover .tl-desc { font-size:.9rem; }

.tl-item.dimmed{ opacity:.35; }

.tl-dot{
  position:absolute;left:-1.5rem;top:1.25rem;
  width:9px;height:9px;border-radius:50%;
  border:1.5px solid var(--text);background:var(--bg);
  transform:translateX(calc(-50% + .5px));
  transition:border-color .2s, background .2s;
}
.tl-item:hover .tl-dot{border-color:var(--accent);background:var(--accent);}

.tl-period,
time.tl-period{
  font-size:.7rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--text);margin-bottom:.35rem;
  display:block;transition:color .2s;
}
.tl-item:hover time.tl-period{ color:var(--accent); }

.tl-title{
  font-size:.95rem;font-weight:500;color:var(--heading);margin-bottom:.35rem;
  transition:font-size .2s var(--ease);
}
.tl-company{color:var(--accent);font-weight:600;}
.tl-desc{
  font-size:.875rem;color:var(--text);line-height:1.65;margin-bottom:.75rem;
  transition:font-size .2s var(--ease);
}
.tl-highlight{
  background:var(--accent2);border:1px solid var(--border);
  border-radius:var(--radius);padding:1rem 1.1rem;
  font-size:.83rem;color:var(--text);line-height:1.6;
}
.tl-highlight strong{color:var(--heading);}
.num-inline{color:var(--accent);font-weight:700;}

/* ── Skills ── */
.skill-groups{display:grid;gap:1.5rem;grid-template-columns:1fr 1fr;margin-top:1.25rem;}
@media(max-width:640px){.skill-groups{grid-template-columns:1fr;}}
.skill-group-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--heading);margin-bottom:.6rem;}
.tags{display:flex;flex-wrap:wrap;gap:.35rem;}
.tag{
  padding:.3rem .75rem;border-radius:999px;
  background:var(--accent2);border:1px solid rgba(45,212,191,.2);
  color:var(--accent);font-size:.72rem;font-weight:500;
  transition:background .2s,border-color .2s;
}
[data-theme="light"] .tag{border-color:rgba(13,148,136,.25);}
.tag:hover{background:rgba(45,212,191,.25);}

/* ── Education ── */
.edu-item { margin-bottom: .5rem; }
.edu-school { font-size: .8rem; font-weight: 700; color: var(--text2); }
.edu-period { font-size: .7rem; color: var(--text); opacity: .7; margin-bottom: .2rem; }
.edu-desc { font-size: .75rem; color: var(--text); line-height: 1.55; opacity: .8; }

/* ── Footer ── */
.footer{
  margin-top:4rem;padding-top:1.5rem;border-top:1px solid var(--border);
  font-size:.8rem;color:var(--text);
}
.footer-links{display:flex;gap:1.5rem;margin-bottom:.5rem;}
.footer-link:hover{color:var(--accent);}

/* ── Fade-in ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
.section-content{animation:fadeUp .55s var(--ease) both;}
.section:nth-child(1) .section-content{animation-delay:.05s;}
.section:nth-child(2) .section-content{animation-delay:.1s;}
.section:nth-child(3) .section-content{animation-delay:.15s;}
.section:nth-child(4) .section-content{animation-delay:.2s;}

@media(max-width:1023px){
  .sidebar{position:relative;height:auto;padding:4rem 1.5rem 2rem;}
}

/* ── Print styles ── */
@media print {
  .top-controls,
  .spotlight,
  .cta,
  .nav { display: none !important; }
  body { background: #fff; color: #0f172a; }
  .container { display: block; max-width: 100%; padding: 0; }
  .sidebar {
    position: static;
    height: auto;
    padding: 2rem 2rem 1rem;
    display: block;
  }
  .content { padding: 1rem 2rem; max-width: 100%; }
  .section { margin-bottom: 2rem; page-break-inside: avoid; }
  .tl-item { page-break-inside: avoid; }
  .about-text, .tl-desc, .num-label, .contact-list { color: #334155; }
  .name, .tl-title, .heading { color: #0f172a; }
  * { animation: none !important; transition: none !important; box-shadow: none !important; }
}
</style>
</head>
<body>
<div class="spotlight" id="spotlight"></div>

<div class="top-controls">
  <button class="ctrl-btn" id="langBtn" onclick="toggleLang()">EN</button>
  <button class="ctrl-btn" id="themeBtn" onclick="toggleTheme()">☀</button>
</div>

<div class="container">
  <aside class="sidebar">
    <div class="photo-wrap">
      <div class="photo-ring"></div>
      <div class="photo-clip">
        <picture>
          <source id="photoWebp" srcset="photo.webp" type="image/webp">
          <img id="photoImg" src="photo.webp" alt="" width="96" height="96">
        </picture>
      </div>
    </div>
    <h1 class="name"    id="profileName"></h1>
    <h2 class="title"   id="profileTitle"></h2>
    <p  class="tagline" id="profileTagline"></p>

    <nav class="nav">
      <ul>
        <li><a class="nav-link active" href="#about"      data-section="about">     <span class="nav-line"></span><span class="nav-label">About</span></a></li>
        <li><a class="nav-link"        href="#numbers"    data-section="numbers">   <span class="nav-line"></span><span class="nav-label">Numbers</span></a></li>
        <li><a class="nav-link"        href="#experience" data-section="experience"><span class="nav-line"></span><span class="nav-label">Experience</span></a></li>
        <li><a class="nav-link"        href="#skills"     data-section="skills">    <span class="nav-line"></span><span class="nav-label">Skills</span></a></li>
      </ul>
    </nav>

    <address class="contact">
      <ul class="contact-list" id="contactList"></ul>
    </address>

    <div class="interests-block">
      <div class="block-label" id="interestsLabel">興趣</div>
      <div id="interestsList"></div>
    </div>

    <div class="interests-block">
      <div class="block-label" id="projectsLabel">興趣延伸 AI 實作</div>
      <div id="projectsList"></div>
    </div>

    <div class="interests-block" id="educationBlock">
      <div class="block-label" id="educationLabel">學歷</div>
      <div id="educationList"></div>
    </div>

    <a href="#" class="cta" id="ctaBtn">
      <span id="ctaLabel">下載履歷 PDF</span>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </a>
  </aside>

  <main class="content">
    <section id="about" class="section">
      <div class="section-head" id="aboutHead">關於我</div>
      <div class="section-content">
        <div class="about-text" id="aboutText"></div>
      </div>
    </section>

    <section id="numbers" class="section">
      <div class="section-head" id="numbersHead">關鍵數字</div>
      <div class="section-content">

// ── Counter animation ──
function animateCounter(el, targetStr, duration) {
  // Match: optional prefix sign, number, then anything after (suffix)
  const match = targetStr.match(/^([+\-]?)(\d+\.?\d*)(.*)/);
  if (!match) { el.textContent = targetStr; return; }
  const prefix = match[1];
  const target = parseFloat(match[2]);
  const suffix = match[3]; // e.g. "x ROAS", "%", "萬"
  const isDecimal = /\.\d/.test(targetStr);
  const start = performance.now();
  function tick(now) {
    const p = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    const val = target * eased;
    el.textContent = prefix + (isDecimal ? val.toFixed(1) : Math.round(val)) + suffix;
    if (p < 1) requestAnimationFrame(tick);
    else el.textContent = prefix + (isDecimal ? target.toFixed(1) : Math.round(target)) + suffix;
  }
  requestAnimationFrame(tick);
}

function initInteractions() {
  const items = document.querySelectorAll('.tl-item');
  items.forEach(item => {
    item.addEventListener('mouseenter', () => {
      items.forEach(o => o.classList.toggle('dimmed', o !== item));
    });
    item.addEventListener('mouseleave', () => {
      items.forEach(o => o.classList.remove('dimmed'));
    });
  });

  const cta = document.querySelector('.cta');
  if (cta) {
    cta.onclick = e => { e.preventDefault(); window.print(); };
  }

  // Numbers counter: trigger on scroll into view
  const numCells = document.querySelectorAll('.num-cell');
  let countersTriggered = false;

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting && !countersTriggered) {
        countersTriggered = true;
        observer.disconnect();
        numCells.forEach(cell => cell.classList.add('in-view'));
        setTimeout(() => {
          document.querySelectorAll('.num-to[data-target]').forEach(el => {
            animateCounter(el, el.dataset.target, 1100);
          });
          document.querySelectorAll('.num-val[data-target]').forEach(el => {
            animateCounter(el, el.dataset.target, 1000);
          });
        }, 200);
      }
    });
  }, { threshold: 0.3 });

  const strip = document.getElementById('numbersStrip');
  if (strip) observer.observe(strip);
}
